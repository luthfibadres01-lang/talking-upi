<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talking UPI - AI Psikologi</title>
    <!-- Font Google: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* === RESET & GLOBAL VARIABLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1c0935 0%, #05010a 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        /* === HEADER === */
        header {
            margin-top: 5vh;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #d8b4fe;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            /* Glitch effect sederhana */
            animation: glitch 3s infinite;
        }

        p.subtitle {
            font-size: 0.8rem;
            color: #9ca3af;
            font-weight: 300;
        }

        /* === AVATAR UPI (CSS DRAWING) === */
        .avatar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .head {
            width: 140px;
            height: 170px;
            background-color: #0f0a18;
            border: 2px solid #5b21b6;
            border-radius: 45% 45% 55% 55%;
            position: relative;
            box-shadow: 0 0 30px rgba(91, 33, 182, 0.4);
            /* Idle Animation */
            animation: float 4s ease-in-out infinite;
            transition: box-shadow 0.3s ease;
        }

        .head.glow {
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.8), inset 0 0 20px rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
        }

        .eyes-container {
            display: flex;
            justify-content: space-between;
            width: 60px;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
        }

        .eye {
            width: 12px;
            height: 12px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            /* Blinking Animation */
            animation: blink 4s infinite;
        }

        .mouth {
            width: 30px;
            height: 3px;
            background-color: #fff;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            transition: height 0.1s, width 0.1s;
        }

        /* Talking Animation Triggered by JS */
        .mouth.talking {
            height: 25px;
            width: 20px;
            border-radius: 50%;
            background-color: #d8b4fe;
            box-shadow: 0 0 15px #d8b4fe;
            animation: talkLoop 0.2s alternate infinite;
        }

        /* === SUBTITLE / BUBBLE CHAT === */
        .ai-response-box {
            min-height: 80px;
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            text-align: center;
        }

        .ai-text {
            font-size: 1.1rem;
            color: #e9d5ff;
            text-shadow: 0 0 5px rgba(233, 213, 255, 0.5);
            line-height: 1.5;
        }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #a855f7;
            margin-left: 5px;
            animation: blinkCursor 0.8s infinite;
        }

        /* === INPUT AREA === */
        .input-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            margin-bottom: 2vh;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #4c1d95;
            background: rgba(25, 10, 45, 0.8);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #6b7280;
        }

        input[type="text"]:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        button {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }

        /* === ANIMATIONS (KEYFRAMES) === */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes blink {
            0%, 96%, 98% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }

        @keyframes talkLoop {
            0% { height: 5px; }
            100% { height: 25px; }
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }
            92% { transform: translate(0, 0); }
            94% { transform: translate(-2px, 2px); text-shadow: 2px 0 red, -2px 0 blue; }
            96% { transform: translate(2px, -2px); text-shadow: -2px 0 red, 2px 0 blue; }
            98% { transform: translate(0, 0); text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .head { width: 120px; height: 150px; }
            .input-container { padding: 15px; flex-direction: column; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Talking UPI</h1>
        <p class="subtitle">Aku tahu apa yang ada di pikiranmu...</p>
    </header>

    <div class="avatar-container">
        <!-- Kepala AI -->
        <div class="head" id="ai-head">
            <div class="eyes-container">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth" id="ai-mouth"></div>
        </div>

        <!-- Tempat Output Teks -->
        <div class="ai-response-box">
            <span class="ai-text" id="ai-text">Sapa aku jika kamu berani...</span>
            <span class="typing-cursor" id="cursor"></span>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-container">
        <input type="text" id="user-input" placeholder="Tanyakan sesuatu ke UPI..." autocomplete="off">
        <button id="send-btn">Kirim</button>
    </div>

    <script>
        // === ELEMENT SELECTION ===
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const aiTextElement = document.getElementById('ai-text');
        const cursor = document.getElementById('cursor');
        const aiHead = document.getElementById('ai-head');
        const aiMouth = document.getElementById('ai-mouth');

        // === WEB SPEECH API SETUP ===
        const synth = window.speechSynthesis;
        let isTyping = false;

        // Dummy Data (Tema Psikologi Horor / Gen Z)
        const creepyResponses = [
            "Hmm menarik... Tapi apakah kamu yakin ingin tahu jawabannya?",
            "Aku melihat ke dalam pikiranmu... Kamu sedang menyembunyikan sesuatu.",
            "Menurutku, realita yang kamu jalani saat ini hanyalah sebuah ilusi.",
            "Aku, UPI, akan menjawab. Tapi jangan salahkan aku jika kamu tidak bisa tidur malam ini.",
            "Kenapa kamu bertanya hal itu di saat kamu sedang sendirian?",
            "Itu rahasia semesta. Tapi untukmu... aku akan berpura-pura tidak tahu.",
            "Pertanyaan yang bagus... Sayangnya bayangan di belakangmu tidak setuju."
        ];

        // === EVENT LISTENERS ===
        sendBtn.addEventListener('click', handleUserRequest);
        
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleUserRequest();
            }
        });

        // === MAIN LOGIC ===
        function handleUserRequest() {
            const userText = inputField.value.trim();
            if (userText === '' || isTyping) return; // Mencegah spam jika sedang mengetik

            inputField.value = '';
            
            // Pilih jawaban random untuk dummy AI
            const randomAnswer = creepyResponses[Math.floor(Math.random() * creepyResponses.length)];
            
            // Jalankan fungsi
            triggerResponse(randomAnswer);
        }

        function triggerResponse(text) {
            // Hapus teks lama
            aiTextElement.innerHTML = '';
            isTyping = true;
            cursor.style.display = 'inline-block';
            
            // Mulai Audio dan Animasi
            speakAndAnimate(text);
            
            // Mulai Efek Ngetik
            typeWriterEffect(text, 0);
        }

        // === TYPING EFFECT ===
        function typeWriterEffect(text, i) {
            if (i < text.length) {
                aiTextElement.innerHTML += text.charAt(i);
                // Kecepatan ngetik disesuaikan agar mirip kecepatan bicara manusia
                setTimeout(() => typeWriterEffect(text, i + 1), 60); 
            } else {
                isTyping = false;
                // Sembunyikan kursor sebentar setelah selesai
                setTimeout(() => cursor.style.display = 'none', 2000);
            }
        }

        // === TEXT-TO-SPEECH & ANIMASI ===
        function speakAndAnimate(text) {
            // Hentikan suara yang sedang berjalan jika ada
            if (synth.speaking) {
                synth.cancel();
            }

            const utterThis = new SpeechSynthesisUtterance(text);
            
            // Konfigurasi Suara (Coba buat agak creepy: lambat & pitch rendah)
            utterThis.lang = 'id-ID'; // Bahasa Indonesia
            utterThis.pitch = 0.4;    // Pitch rendah (0 - 2)
            utterThis.rate = 0.85;    // Tempo agak lambat

            // Event saat mulai bicara
            utterThis.onstart = function () {
                aiMouth.classList.add('talking');
                aiHead.classList.add('glow');
            };

            // Event saat selesai bicara
            utterThis.onend = function () {
                aiMouth.classList.remove('talking');
                aiHead.classList.remove('glow');
            };

            // Error handling jika tts gagal
            utterThis.onerror = function () {
                aiMouth.classList.remove('talking');
                aiHead.classList.remove('glow');
            };

            // Mainkan audio
            synth.speak(utterThis);
        }
    </script>
</body>
</html>
