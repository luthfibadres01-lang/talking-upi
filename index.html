<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talking UPI - Virtual AI Head</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --primary-color: #00d2ff;
            --accent-color: #9d50bb;
            --text-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            overflow: hidden;
        }

        header {
            position: absolute;
            top: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- UPI AVATAR SECTION --- */
        .canvas-area {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .upi-head {
            position: relative;
            width: 180px;
            height: 200px;
            background: #e0e0e0;
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.2);
            animation: idle 3s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .upi-head.talking {
            box-shadow: 0 0 70px rgba(0, 210, 255, 0.6);
            border: 2px solid var(--primary-color);
        }

        /* Mata */
        .eyes {
            display: flex;
            gap: 40px;
            margin-top: 60px;
        }

        .eye {
            width: 20px;
            height: 20px;
            background: #222;
            border-radius: 50%;
            position: relative;
            animation: blink 4s infinite;
        }

        /* Mulut */
        .mouth {
            width: 40px;
            height: 10px;
            background: #555;
            border-radius: 5px;
            margin-top: 40px;
            transition: all 0.1s ease;
        }

        .mouth.talking {
            animation: speak 0.2s infinite;
            height: 30px;
            border-radius: 50%;
        }

        /* Animasi */
        @keyframes idle {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        @keyframes speak {
            0%, 100% { height: 10px; }
            50% { height: 35px; width: 45px; }
        }

        /* --- UI COMPONENTS --- */
        .chat-container {
            width: 100%;
            max-width: 500px;
            position: absolute;
            bottom: 50px;
            padding: 0 20px;
        }

        .subtitle-box {
            height: 60px;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0,210,255,0.5);
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
        }

        button {
            background: var(--primary-color);
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            color: #111;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #fff;
        }

        /* Responsive */
        @media (max-width: 480px) {
            header h1 { font-size: 1.8rem; }
            .upi-head { width: 140px; height: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>TALKING UPI</h1>
        <p>AI Companion Virtual</p>
    </header>

    <div class="canvas-area">
        <div class="upi-head" id="upiHead">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth" id="upiMouth"></div>
        </div>
    </div>

    <div class="chat-container">
        <div class="subtitle-box" id="subtitle">Halo! Tanyakan sesuatu padaku...</div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanyakan sesuatu ke UPI..." autocomplete="off">
            <button id="sendBtn">KIRIM</button>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const subtitle = document.getElementById('subtitle');
        const upiHead = document.getElementById('upiHead');
        const upiMouth = document.getElementById('upiMouth');

        // Logic Jawaban Dummy (Bisa diganti API OpenAI)
        const responses = {
            "halo": "Halo juga! Aku UPI. Ada yang bisa aku bantu?",
            "siapa kamu": "Aku adalah Talking UPI, asisten virtual berbasis web yang siap menemanimu.",
            "apa kabar": "Aku merasa luar biasa hari ini! Bagaimana dengan kamu?",
            "siapa penciptamu": "Aku diciptakan dengan kode rahasia yang keren oleh pengembang hebat seperti kamu!",
            "lucu": "Hehe, terima kasih! Kamu juga sangat ramah.",
            "default": "Wah, pertanyaan yang menarik. Menurutku itu sangat luar biasa!"
        };

        // Fungsi Bicara (Web Speech API)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID'; // Bahasa Indonesia
            utterance.pitch = 1.2;
            utterance.rate = 1.0;

            // Start Animasi
            utterance.onstart = () => {
                upiHead.classList.add('talking');
                upiMouth.classList.add('talking');
            };

            // End Animasi
            utterance.onend = () => {
                upiHead.classList.remove('talking');
                upiMouth.classList.remove('talking');
            };

            window.speechSynthesis.speak(utterance);
        }

        // Efek Mengetik (Typewriter)
        function typeWriter(text) {
            subtitle.innerText = "";
            let i = 0;
            const speed = 50; 

            function type() {
                if (i < text.length) {
                    subtitle.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // Proses Jawaban
        function processInput() {
            const input = userInput.value.toLowerCase().trim();
            if (input === "") return;

            let responseText = responses.default;
            
            // Cek keyword sederhana
            for (let key in responses) {
                if (input.includes(key)) {
                    responseText = responses[key];
                    break;
                }
            }

            // Jalankan UI & Audio
            typeWriter(responseText);
            speak(responseText);
            userInput.value = "";
        }

        // Event Listeners
        sendBtn.addEventListener('click', processInput);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        // Trigger suara pertama untuk interaksi (opsional)
        window.addEventListener('load', () => {
            console.log("UPI Ready!");
        });
    </script>
</body>
</html>
